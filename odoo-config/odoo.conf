[options]
# Admin password for database management
admin_passwd = admin

# Database configuration
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = postgres

# Data directory
data_dir = /var/lib/odoo

# Addons paths
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

# Logging
logfile = /var/log/odoo/odoo.log
log_level = info

# Server configuration
http_port = 8069
workers = 2
max_cron_threads = 1

# Security
list_db = True

# Proxy mode (enable if behind reverse proxy)
proxy_mode = False

# Language
language = en_US
timezone = UTC
